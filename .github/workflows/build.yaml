name: Build and Release

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3)"
        required: true
      description:
        description: "Description"
        required: false
        default: ""

permissions:
  contents: read

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      artifact-name: dist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version-file: .tool-versions

      - name: Typecheck build.py
        run: uv run mypy --strict build.py

      - name: Determine emscripten version
        id: emscripten
        run: echo "VERSION=$(uv run build.py --emcc-version)" >> "$GITHUB_OUTPUT"

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: ${{ steps.emscripten.outputs.VERSION }}

      - name: Show emcc version
        run: emcc --version

      - name: Setup node (for bench verification)
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions

      - name: Install dependencies
        run: npm ci

      - name: Typecheck tools
        run: npx tsc

      - name: Cache network files
        uses: actions/cache@v6
        with:
          path: nn-*.nnue
          key: nnue-${{ hashFiles('build.py', 'patches/**') }}
          restore-keys: nnue-

      - name: Configure committer
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Build and verify stockfishes
        run: ./build.py dist --verify-bench

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            *.js
            *.wasm

  release:
    name: Release
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Validate version
        run: |
          [[ "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]] || \
          (echo "Version must start with 'v' and match 'v<major>.<minor>.<patch>'" && exit 1)

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Setup node (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          registry-url: https://registry.npmjs.org/

      - name: Bump package.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          NPM_VERSION="${GITHUB_VERSION#v}"
          npm version "$NPM_VERSION" --allow-same-version
        env:
          GITHUB_VERSION: ${{ github.event.inputs.version }}

      - name: Publish to npm
        run: |
          npm publish --provenance --access public
          git push origin HEAD --follow-tags

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.description }}
